<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <h1>Registration</h1>
        <table>
            <tbody>
                <tr>
                    <td>
                        <fieldset>
                            <legend>General Information</legend>
                            <label for="fname"><b>First Name:</b></label>
                            <input type="text" id="fname" name="userFirstName">
                            <br><br>
                            <label for="lname"><b>Last Name:</b></label>
                            <input type="text" id="lname" name="userLastName">
                            <br><br>
                            <label><b>Gender:</b></label>
                            <input type="radio" id="maleG" name="gender" value="Male">Male
                            <input type="radio" id="femaleG" name="gender" value="Female">Female
                            <br><br>

                            <label for="faname"><b>Father's Name:</b></label>
                            <input type="text" id="faname" name="userFatherName">
                            <input type="file" id="file" name="file">
                            <br><br>
                            <label for="mname"><b>Mother's Name:</b></label>
                            <input type="text" id="mname" name="userMotherName">
                            <br><br>
                            <label for="blg"><b>Blood Group:</b></label>
                            <select name="blg" id="blg">
                                <option value="A+">A+</option>
                                <option value="B+">B+</option>
                                <option value="A-">A-</option>
                                <option value="AB-">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                            <br><br>
                            <label for="religionSel"><b>Select your relegion:</b></label>
                            <select name="userreligion" id="religionSel">
                                <option value="Islam">Islam</option>
                                <option value="Christianity">Christianity</option>
                                <option value="Hinduism">Hinduism</option>
                                <option value="Buddhism">Buddhism</option>
                            </select>
                        </fieldset>
                    </td>
                    <td>
                        <fieldset>
                            <legend>Contact Information</legend>
                            <label for="email"><b>Email:</b></label>
                            <input type="text" id="email" name="userEmailName">
                            <br><br>
                            <label for="phone"><b>Phone/Mobile:</b></label>
                            <input type="text" id="phone" name="userPhone">
                            <br><br>
                            <label for="website"><b>Website:</b></label>
                            <input type="text" id="website" name="website">

                            <br><br>
                            <label><b>Address:</b></label>
                            <fieldset>
                                <legend>Present Address</legend>
                                <select name="usercountry" id="country">
                                <option value="Bangladesh">Bangladesh</option>
                                </select>
                                <select name="usercity" id="city">
                                <option value="Dhaka">Dhaka</option>
                                </select>
                                <br><br>
                                <textarea id="area" name="area" placeholder="Road/City/Street"></textarea>
                                <br><br>
                                <input type="text" id="postcode" name="postcode" placeholder="Post Code">
                            </fieldset>
                        </fieldset>
                    </td>
                    <td>
                        <fieldset>
                            <legend>Account Information:</legend>
                            <label for="username"><b>Username:</b></label>
                            <input type="text" id="username" name="username">
                            <br><br>
                            <label for="password"><b>Password:</b></label>
                            <input type="password" id="password" name="password">
                            <br><br>
                            <label for="confpassword"><b>Confirm Password:</b></label>
                            <input type="password" id="confpassword" name="confpassword">
                        </fieldset>
                        <br>
                        <input type="submit" value="Register">
                    </td>

                </tr>
            </tbody>
        </table>
    </body>
</html>
